<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFly - Gallery</title>
  <meta name="description" content="Explore the wonderful profiles created by our community on ProFly.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Header -->
  <div id="app-header"></div>

  <main class="container" style="padding-top: 120px; min-height: 70vh;">
    <div class="section-header">
      <h2>Our Gallery</h2>
      <p>Explore the wonderful profiles created by our community.</p>
      <a class="btn-primary" href="../index.html" style="display:inline-block; margin-top:15px;"><i class="fas fa-arrow-left"></i> Back To Home</a>
    </div>
    <div class="cards-container" id="gallery">
      <!-- Cards rendered by JS -->
    </div>
  </main>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close-modal" id="closeModal">&times;</span>
      <img src="" alt="Profile Image" id="modalImg">
      <h2 id="modalName"></h2>
      <p id="modalDesc"></p>
    </div>
  </div>

  <!-- Footer -->
  <div id="app-footer"></div>

  <script src="../js/main.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
